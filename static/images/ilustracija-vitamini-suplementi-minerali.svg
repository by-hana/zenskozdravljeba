<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="cap1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e91e8c"/>
      <stop offset="100%" style="stop-color:#c2185b"/>
    </linearGradient>
    <linearGradient id="body1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b1fa2"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Large center capsule -->
  <rect x="295" y="165" width="210" height="90" rx="45" fill="#7b1fa2"/>
  <rect x="295" y="165" width="105" height="90" rx="45 0 0 45" fill="#e91e8c"/>
  <line x1="400" y1="165" x2="400" y2="255" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <text x="348" y="217" text-anchor="middle" fill="white" font-size="13" font-family="Georgia" font-weight="bold">Myo</text>
  <text x="452" y="217" text-anchor="middle" fill="white" font-size="13" font-family="Georgia" font-weight="bold">D-Chiro</text>

  <!-- Floating pills around center -->
  <!-- Pill 1 - Vitamin D (yellow) -->
  <ellipse cx="160" cy="150" rx="32" ry="18" fill="#ffa726" opacity="0.9"/>
  <text x="160" y="155" text-anchor="middle" fill="white" font-size="11" font-family="Georgia" font-weight="bold">D3</text>

  <!-- Pill 2 - Magnesium (teal) -->
  <ellipse cx="640" cy="150" rx="32" ry="18" fill="#26a69a" opacity="0.9"/>
  <text x="640" y="155" text-anchor="middle" fill="white" font-size="10" font-family="Georgia" font-weight="bold">Mg</text>

  <!-- Pill 3 - Iron (red) -->
  <ellipse cx="120" cy="280" rx="32" ry="18" fill="#e53935" opacity="0.9"/>
  <text x="120" y="285" text-anchor="middle" fill="white" font-size="10" font-family="Georgia" font-weight="bold">Fe</text>

  <!-- Pill 4 - B12 (blue) -->
  <ellipse cx="680" cy="280" rx="32" ry="18" fill="#1976d2" opacity="0.9"/>
  <text x="680" y="285" text-anchor="middle" fill="white" font-size="10" font-family="Georgia" font-weight="bold">B12</text>

  <!-- Pill 5 - Zinc (green) -->
  <ellipse cx="180" cy="370" rx="32" ry="18" fill="#43a047" opacity="0.9"/>
  <text x="180" y="375" text-anchor="middle" fill="white" font-size="10" font-family="Georgia" font-weight="bold">Zn</text>

  <!-- Pill 6 - Omega3 (orange) -->
  <ellipse cx="620" cy="370" rx="32" ry="18" fill="#e65100" opacity="0.9"/>
  <text x="620" y="375" text-anchor="middle" fill="white" font-size="10" font-family="Georgia" font-weight="bold">Ω3</text>

  <!-- Pill 7 - Folate -->
  <ellipse cx="400" cy="90" rx="32" ry="18" fill="#8bc34a" opacity="0.9"/>
  <text x="400" y="95" text-anchor="middle" fill="white" font-size="10" font-family="Georgia" font-weight="bold">B9</text>

  <!-- Pill 8 - Selenium -->
  <ellipse cx="400" cy="390" rx="32" ry="18" fill="#7e57c2" opacity="0.9"/>
  <text x="400" y="395" text-anchor="middle" fill="white" font-size="10" font-family="Georgia" font-weight="bold">Se</text>

  <!-- Connecting dots -->
  <circle cx="200" cy="175" r="3" fill="#e91e8c" opacity="0.5"/>
  <circle cx="240" cy="195" r="3" fill="#e91e8c" opacity="0.4"/>
  <circle cx="600" cy="175" r="3" fill="#c9a8e0" opacity="0.5"/>
  <circle cx="560" cy="195" r="3" fill="#c9a8e0" opacity="0.4"/>
  <circle cx="200" cy="260" r="3" fill="#e91e8c" opacity="0.4"/>
  <circle cx="240" cy="245" r="3" fill="#e91e8c" opacity="0.3"/>

  <!-- Labels for pills -->
  <text x="160" y="180" text-anchor="middle" fill="#ffcc80" font-size="10" font-family="Georgia">Vitamin D</text>
  <text x="640" y="180" text-anchor="middle" fill="#80cbc4" font-size="10" font-family="Georgia">Magnezijum</text>
  <text x="120" y="310" text-anchor="middle" fill="#ef9a9a" font-size="10" font-family="Georgia">Željezo</text>
  <text x="680" y="310" text-anchor="middle" fill="#90caf9" font-size="10" font-family="Georgia">Vitamin B12</text>
  <text x="180" y="400" text-anchor="middle" fill="#a5d6a7" font-size="10" font-family="Georgia">Cink</text>
  <text x="620" y="400" text-anchor="middle" fill="#ffcc80" font-size="10" font-family="Georgia">Omega-3</text>
  <text x="400" y="122" text-anchor="middle" fill="#dce775" font-size="10" font-family="Georgia">Folna kiselina</text>
  <text x="400" y="422" text-anchor="middle" fill="#b39ddb" font-size="10" font-family="Georgia">Selen</text>

  <!-- Title -->
  <text x="400" y="295" text-anchor="middle" fill="white" font-size="15" font-family="Georgia" font-weight="bold">Vitamini · Suplementi · Minerali</text>
  <text x="400" y="315" text-anchor="middle" fill="#c9a8e0" font-size="12" font-family="Georgia">Individualni pristup · Naučno zasnovano</text>
</svg>
