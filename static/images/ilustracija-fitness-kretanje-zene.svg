  <text x="620" y="165" fill="#4caf50" font-size="12">✓</text><text x="637" y="166" fill="#c9a8e0" font-size="11" font-family="Georgia">Raspoloženje</text>
  <text x="620" y="190" fill="#4caf50" font-size="12">✓</text><text x="637" y="191" fill="#c9a8e0" font-size="11" font-family="Georgia">Energija</text>
  <text x="620" y="215" fill="#4caf50" font-size="12">✓</text><text x="637" y="216" fill="#c9a8e0" font-size="11" font-family="Georgia">Kosti (Ca)</text>
  <text x="620" y="240" fill="#4caf50" font-size="12">✓</text><text x="637" y="241" fill="#c9a8e0" font-size="11" font-family="Georgia">San</text>
  <text x="620" y="265" fill="#4caf50" font-size="12">✓</text><text x="637" y="266" fill="#c9a8e0" font-size="11" font-family="Georgia">PMS simptomi</text>
  <text x="620" y="290" fill="#4caf50" font-size="12">✓</text><text x="637" y="291" fill="#c9a8e0" font-size="11" font-family="Georgia">Težina</text>
  <text x="620" y="315" fill="#4caf50" font-size="12">✓</text><text x="637" y="316" fill="#c9a8e0" font-size="11" font-family="Georgia">PCOS</text>
  <text x="620" y="340" fill="#4caf50" font-size="12">✓</text><text x="637" y="341" fill="#c9a8e0" font-size="11" font-family="Georgia">Menopauza</text>

  <!-- Ground line -->
  <line x1="80" y1="370" x2="540" y2="370" stroke="#6b4fa0" stroke-width="2" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="415" text-anchor="middle" fill="#e91e8c" font-size="18" font-family="Georgia" font-weight="bold">Fitness za žensko zdravlje</text>
