  <text x="127" y="108" text-anchor="middle" fill="#e91e8c" font-size="13" font-family="Georgia" font-weight="bold">Aktivnosti</text>
  <line x1="65" y1="118" x2="190" y2="118" stroke="#6b4fa0" stroke-width="1"/>
  <text x="70" y="142" fill="#c9a8e0" font-size="22">🧘</text><text x="98" y="143" fill="#c9a8e0" font-size="12" font-family="Georgia">Yoga</text>
  <text x="70" y="175" fill="#c9a8e0" font-size="22">🏃</text><text x="98" y="176" fill="#c9a8e0" font-size="12" font-family="Georgia">Trčanje</text>
  <text x="70" y="208" fill="#c9a8e0" font-size="22">🏋</text><text x="98" y="209" fill="#c9a8e0" font-size="12" font-family="Georgia">Snaga</text>
  <text x="70" y="241" fill="#c9a8e0" font-size="22">🚶</text><text x="98" y="242" fill="#c9a8e0" font-size="12" font-family="Georgia">Hodanje</text>
  <text x="70" y="274" fill="#c9a8e0" font-size="22">🤸</text><text x="98" y="275" fill="#c9a8e0" font-size="12" font-family="Georgia">Pilates</text>
  <text x="70" y="307" fill="#c9a8e0" font-size="22">🏊</text><text x="98" y="308" fill="#c9a8e0" font-size="12" font-family="Georgia">Plivanje</text>
  <text x="70" y="340" fill="#c9a8e0" font-size="22">🚴</text><text x="98" y="341" fill="#c9a8e0" font-size="12" font-family="Georgia">Biciklizam</text>

  <!-- Right benefits -->
