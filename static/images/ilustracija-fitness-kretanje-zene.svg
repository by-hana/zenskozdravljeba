<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0533"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Running figure (abstract) -->
  <!-- Head -->
  <circle cx="390" cy="100" r="28" fill="#e91e8c" opacity="0.85"/>
  <!-- Body -->
  <line x1="390" y1="128" x2="385" y2="220" stroke="#c9a8e0" stroke-width="8" stroke-linecap="round"/>
  <!-- Forward arm -->
  <line x1="388" y1="155" x2="330" y2="185" stroke="#c9a8e0" stroke-width="6" stroke-linecap="round"/>
  <line x1="330" y1="185" x2="310" y2="215" stroke="#c9a8e0" stroke-width="5" stroke-linecap="round"/>
  <!-- Back arm -->
  <line x1="387" y1="155" x2="445" y2="175" stroke="#c9a8e0" stroke-width="6" stroke-linecap="round"/>
  <line x1="445" y1="175" x2="475" y2="155" stroke="#c9a8e0" stroke-width="5" stroke-linecap="round"/>
  <!-- Forward leg -->
  <line x1="385" y1="220" x2="345" y2="300" stroke="#c9a8e0" stroke-width="7" stroke-linecap="round"/>
  <line x1="345" y1="300" x2="305" y2="340" stroke="#c9a8e0" stroke-width="6" stroke-linecap="round"/>
  <!-- Back leg -->
  <line x1="385" y1="220" x2="440" y2="285" stroke="#c9a8e0" stroke-width="7" stroke-linecap="round"/>
  <line x1="440" y1="285" x2="480" y2="310" stroke="#c9a8e0" stroke-width="6" stroke-linecap="round"/>

  <!-- Motion lines -->
  <line x1="200" y1="170" x2="280" y2="170" stroke="#e91e8c" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  <line x1="220" y1="185" x2="285" y2="185" stroke="#e91e8c" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="240" y1="200" x2="290" y2="200" stroke="#e91e8c" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Heartbeat line -->
  <path d="M520,210 L560,210 L575,175 L590,245 L605,195 L620,225 L640,210 L680,210" stroke="#e91e8c" stroke-width="3" fill="none"/>
  <text x="600" y="265" text-anchor="middle" fill="#e91e8c" font-size="11" font-family="Georgia">Srčani ritam</text>

