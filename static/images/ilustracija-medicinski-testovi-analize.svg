<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a0d33"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Central blood tube -->
  <rect x="360" y="80" width="80" height="200" rx="40" fill="#1a0533" stroke="#e91e8c" stroke-width="2.5"/>
  <rect x="363" y="83" width="74" height="120" rx="37" fill="#c2185b" opacity="0.7"/>
  <!-- Serum layer -->
  <rect x="363" y="203" width="74" height="50" rx="5" fill="#ffa726" opacity="0.5"/>
  <!-- Cap -->
  <rect x="355" y="74" width="90" height="22" rx="8" fill="#e91e8c"/>
  <text x="400" y="325" text-anchor="middle" fill="#c9a8e0" font-size="11" font-family="Georgia">Krv za analizu</text>

  <!-- Test tubes left -->
  <rect x="250" y="120" width="45" height="120" rx="22" fill="#1a0533" stroke="#9c27b0" stroke-width="2"/>
  <rect x="253" y="123" width="39" height="80" rx="20" fill="#7b1fa2" opacity="0.6"/>
  <rect x="245" y="114" width="55" height="16" rx="6" fill="#9c27b0"/>
  <text x="272" y="258" text-anchor="middle" fill="#c9a8e0" font-size="10" font-family="Georgia">Hormoni</text>

  <rect x="170" y="140" width="45" height="100" rx="22" fill="#1a0533" stroke="#4caf50" stroke-width="2"/>
  <rect x="173" y="143" width="39" height="65" rx="20" fill="#2e7d32" opacity="0.6"/>
  <rect x="165" y="134" width="55" height="16" rx="6" fill="#4caf50"/>
  <text x="192" y="258" text-anchor="middle" fill="#c9a8e0" font-size="10" font-family="Georgia">Vitamini</text>

  <!-- Test tubes right -->
  <rect x="505" y="120" width="45" height="120" rx="22" fill="#1a0533" stroke="#1976d2" stroke-width="2"/>
  <rect x="508" y="123" width="39" height="80" rx="20" fill="#1565c0" opacity="0.6"/>
  <rect x="500" y="114" width="55" height="16" rx="6" fill="#1976d2"/>
  <text x="527" y="258" text-anchor="middle" fill="#c9a8e0" font-size="10" font-family="Georgia">Krvna slika</text>

  <rect x="585" y="140" width="45" height="100" rx="22" fill="#1a0533" stroke="#ffa726" stroke-width="2"/>
  <rect x="588" y="143" width="39" height="65" rx="20" fill="#e65100" opacity="0.6"/>
  <rect x="580" y="134" width="55" height="16" rx="6" fill="#ffa726"/>
  <text x="607" y="258" text-anchor="middle" fill="#c9a8e0" font-size="10" font-family="Georgia">Glikemija</text>

  <!-- Test panel left -->
  <rect x="35" y="60" width="195" height="320" rx="10" fill="#0a1628" stroke="#1976d2" stroke-width="1.5"/>
  <text x="132" y="88" text-anchor="middle" fill="#64b5f6" font-size="13" font-family="Georgia" font-weight="bold">Hormonski panel</text>
  <line x1="50" y1="98" x2="215" y2="98" stroke="#1565c0" stroke-width="1"/>
  <text x="50" y="118" fill="#90caf9" font-size="11" font-family="Georgia">FSH / LH</text>
  <text x="50" y="138" fill="#90caf9" font-size="11" font-family="Georgia">Estradiol (E2)</text>
  <text x="50" y="158" fill="#90caf9" font-size="11" font-family="Georgia">Progesteron</text>
  <text x="50" y="178" fill="#f48fb1" font-size="11" font-family="Georgia">Testosteron ukupni</text>
  <text x="50" y="198" fill="#f48fb1" font-size="11" font-family="Georgia">DHEA-S</text>
  <text x="50" y="218" fill="#ce93d8" font-size="11" font-family="Georgia">TSH / fT3 / fT4</text>
  <text x="50" y="238" fill="#ce93d8" font-size="11" font-family="Georgia">Prolaktin</text>
  <text x="50" y="258" fill="#a5d6a7" font-size="11" font-family="Georgia">AMH</text>
  <text x="50" y="278" fill="#a5d6a7" font-size="11" font-family="Georgia">Inzulin / HOMA</text>
  <text x="50" y="298" fill="#ffcc80" font-size="11" font-family="Georgia">Vitamin D (25-OH)</text>
  <text x="50" y="318" fill="#ffcc80" font-size="11" font-family="Georgia">Ferritin / Fe</text>
  <text x="50" y="338" fill="#80cbc4" font-size="11" font-family="Georgia">CRP (upala)</text>
  <text x="50" y="358" fill="#80cbc4" font-size="11" font-family="Georgia">HbA1c</text>

  <!-- Test panel right -->
  <rect x="570" y="60" width="195" height="320" rx="10" fill="#0a1628" stroke="#e91e8c" stroke-width="1.5"/>
  <text x="667" y="88" text-anchor="middle" fill="#e91e8c" font-size="13" font-family="Georgia" font-weight="bold">Screening testovi</text>
  <line x1="585" y1="98" x2="750" y2="98" stroke="#c2185b" stroke-width="1"/>
  <text x="590" y="118" fill="#f48fb1" font-size="11" font-family="Georgia">● PAPA test (godišnje)</text>
  <text x="590" y="140" fill="#f48fb1" font-size="11" font-family="Georgia">● Ultrazvuk zdjelice</text>
  <text x="590" y="162" fill="#c9a8e0" font-size="11" font-family="Georgia">● Mamografija (40+)</text>
  <text x="590" y="184" fill="#c9a8e0" font-size="11" font-family="Georgia">● HPV test</text>
  <text x="590" y="206" fill="#a5d6a7" font-size="11" font-family="Georgia">● DEXA (gustoća kostiju)</text>
  <text x="590" y="228" fill="#a5d6a7" font-size="11" font-family="Georgia">● Krvni tlak</text>
  <text x="590" y="250" fill="#ffcc80" font-size="11" font-family="Georgia">● Lipidni profil</text>
  <text x="590" y="272" fill="#ffcc80" font-size="11" font-family="Georgia">● Glukoza natašte</text>
  <text x="590" y="294" fill="#80cbc4" font-size="11" font-family="Georgia">● Štitna žlijezda</text>
  <text x="590" y="316" fill="#80cbc4" font-size="11" font-family="Georgia">● Kompleta krvna sl.</text>
  <text x="590" y="338" fill="#ce93d8" font-size="11" font-family="Georgia">● Test intolerancije</text>
  <text x="590" y="360" fill="#ce93d8" font-size="11" font-family="Georgia">● Genski testovi</text>

  <!-- Title -->
  <text x="400" y="405" text-anchor="middle" fill="#64b5f6" font-size="18" font-family="Georgia" font-weight="bold">Medicinski testovi za žene</text>
  <text x="400" y="428" text-anchor="middle" fill="#8b6fb5" font-size="12" font-family="Georgia">Rano otkrivanje · Hormonski panel · Prevencija</text>
</svg>
