<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="45%" stop-color="#FFF0D0"/>
      <stop offset="100%" stop-color="#F5E0F0"/>
    </linearGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8A0"/>
      <stop offset="40%" stop-color="#FFD840"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE840" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFAA00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A0C0"/>
      <stop offset="100%" stop-color="#C06890"/>
    </linearGradient>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#FF9020"/>
    </linearGradient>
    <linearGradient id="boneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0E8D0"/>
      <stop offset="100%" stop-color="#D8C8A0"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD840" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD840" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur12">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="blur6">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Sun glow background -->
  <circle cx="200" cy="220" r="320" fill="url(#bgGlow)" filter="url(#blur12)" opacity="0.8"/>
  <circle cx="200" cy="220" r="200" fill="#FFE870" opacity="0.12" filter="url(#blur12)"/>

  <!-- Soft dot texture -->
  <g opacity="0.12" fill="#D8A030">
    <circle cx="500" cy="50" r="2"/><circle cx="560" cy="40" r="1.5"/><circle cx="620" cy="65" r="2"/><circle cx="680" cy="35" r="1.5"/><circle cx="740" cy="55" r="2"/><circle cx="800" cy="40" r="1.5"/><circle cx="860" cy="60" r="2"/>
    <circle cx="520" cy="100" r="1.5"/><circle cx="580" cy="90" r="2"/><circle cx="640" cy="110" r="1.5"/><circle cx="700" cy="85" r="2"/><circle cx="760" cy="100" r="1.5"/><circle cx="820" cy="88" r="2"/>
    <circle cx="550" cy="150" r="2"/><circle cx="610" cy="140" r="1.5"/><circle cx="670" cy="160" r="2"/><circle cx="730" cy="145" r="1.5"/><circle cx="790" cy="155" r="2"/><circle cx="850" cy="140" r="1.5"/>
    <circle cx="520" cy="400" r="1.5"/><circle cx="580" cy="420" r="2"/><circle cx="640" cy="405" r="1.5"/><circle cx="700" cy="415" r="2"/><circle cx="760" cy="400" r="1.5"/><circle cx="820" cy="420" r="2"/>
    <circle cx="540" cy="450" r="2"/><circle cx="600" cy="460" r="1.5"/><circle cx="660" cy="445" r="2"/><circle cx="720" cy="458" r="1.5"/><circle cx="780" cy="445" r="2"/>
  </g>

  <!-- SUN (left area) -->
  <g transform="translate(200, 220)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="140" fill="url(#sunGlow)" filter="url(#blur6)"/>
    <!-- Long sun rays (16 rays) -->
    <g stroke="#FFB820" stroke-linecap="round" opacity="0.5">
      <line x1="0" y1="-95" x2="0" y2="-135" stroke-width="3"/>
      <line x1="67" y1="-67" x2="95" y2="-95" stroke-width="2.5"/>
      <line x1="95" y1="0" x2="135" y2="0" stroke-width="3"/>
      <line x1="67" y1="67" x2="95" y2="95" stroke-width="2.5"/>
      <line x1="0" y1="95" x2="0" y2="135" stroke-width="3"/>
      <line x1="-67" y1="67" x2="-95" y2="95" stroke-width="2.5"/>
      <line x1="-95" y1="0" x2="-135" y2="0" stroke-width="3"/>
      <line x1="-67" y1="-67" x2="-95" y2="-95" stroke-width="2.5"/>
      <!-- Secondary rays (between main) -->
      <line x1="37" y1="-85" x2="52" y2="-120" stroke-width="2"/>
      <line x1="85" y1="-37" x2="120" y2="-52" stroke-width="2"/>
      <line x1="85" y1="37" x2="120" y2="52" stroke-width="2"/>
      <line x1="37" y1="85" x2="52" y2="120" stroke-width="2"/>
      <line x1="-37" y1="85" x2="-52" y2="120" stroke-width="2"/>
      <line x1="-85" y1="37" x2="-120" y2="52" stroke-width="2"/>
      <line x1="-85" y1="-37" x2="-120" y2="-52" stroke-width="2"/>
      <line x1="-37" y1="-85" x2="-52" y2="-120" stroke-width="2"/>
    </g>
    <!-- Sun body -->
    <circle cx="0" cy="0" r="82" fill="url(#sunCore)"/>
    <!-- Inner glow rings -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#FFF080" stroke-width="3" opacity="0.5"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#FFE840" stroke-width="2" opacity="0.4"/>
    <!-- Sun face highlight -->
    <circle cx="-20" cy="-20" r="30" fill="#FFF8C0" opacity="0.25"/>
    <!-- D3 label in sun -->
    <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="bold" fill="#A05000" opacity="0.7" font-family="Georgia, serif">D3</text>
  </g>

  <!-- Ray lines extending to right (vitamin D reaching body) -->
  <g stroke="#FFD050" opacity="0.2" stroke-width="1.5">
    <line x1="340" y1="180" x2="500" y2="180"/>
    <line x1="345" y1="210" x2="500" y2="220"/>
    <line x1="340" y1="240" x2="500" y2="265"/>
    <line x1="330" y1="270" x2="490" y2="310"/>
  </g>

  <!-- Female silhouette (center-right, abstract) -->
  <g transform="translate(560, 80)" opacity="0.9">
    <!-- Head -->
    <circle cx="0" cy="0" r="35" fill="url(#bodyGrad)" opacity="0.85"/>
    <!-- Hair suggestion -->
    <path d="M-35,-5 C-40,-30 -25,-50 0,-52 C25,-50 40,-30 35,-5" fill="#9B4070" opacity="0.7"/>
    <!-- Neck -->
    <rect x="-12" y="32" width="24" height="25" rx="8" fill="url(#bodyGrad)" opacity="0.85"/>
    <!-- Shoulders + torso -->
    <path d="M-12,55 C-45,58 -65,80 -60,130 C-55,175 -40,200 -30,220 L30,220 C40,200 55,175 60,130 C65,80 45,58 12,55 Z" fill="url(#bodyGrad)" opacity="0.85"/>
    <!-- Arms raised slightly (sunbathing pose) -->
    <path d="M-60,80 C-80,60 -100,48 -115,55 C-108,62 -100,72 -90,88 C-78,80 -70,78 -60,90" fill="url(#bodyGrad)" opacity="0.8"/>
    <path d="M60,80 C80,60 100,48 115,55 C108,62 100,72 90,88 C78,80 70,78 60,90" fill="url(#bodyGrad)" opacity="0.8"/>
    <!-- Torso highlight -->
    <path d="M-5,60 C-8,90 -8,130 -3,160" fill="none" stroke="white" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- Cells / molecules (right side cluster) -->
  <!-- Cell 1: large -->
  <g transform="translate(760, 180)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#FFB020" stroke-width="2.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="45" fill="#FFD850" opacity="0.12"/>
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="18" fill="url(#cellGrad)" opacity="0.7"/>
    <circle cx="-5" cy="-5" r="8" fill="#FFE060" opacity="0.5"/>
    <!-- Organelles / dots -->
    <circle cx="28" cy="-15" r="6" fill="#FFC030" opacity="0.55"/>
    <circle cx="-30" cy="12" r="5" fill="#FFC030" opacity="0.5"/>
    <circle cx="20" cy="30" r="7" fill="#FFB820" opacity="0.55"/>
    <circle cx="-18" cy="-28" r="5" fill="#FFC030" opacity="0.5"/>
    <circle cx="35" cy="20" r="4" fill="#FFA818" opacity="0.45"/>
    <!-- Vitamin D symbol inside -->
    <text x="0" y="5" text-anchor="middle" font-size="12" font-weight="bold" fill="#A05800" opacity="0.65" font-family="Georgia, serif">D3</text>
  </g>
  <!-- Cell 2: medium -->
  <g transform="translate(840, 320)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#E8A820" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="35" fill="#FFD040" opacity="0.1"/>
    <circle cx="0" cy="0" r="14" fill="#FFB820" opacity="0.65"/>
    <circle cx="20" cy="-12" r="5" fill="#FFC030" opacity="0.5"/>
    <circle cx="-22" cy="10" r="5" fill="#FFB020" opacity="0.5"/>
    <circle cx="12" cy="22" r="4" fill="#FFC030" opacity="0.45"/>
  </g>
  <!-- Cell 3: small -->
  <g transform="translate(695" y="340)">
  </g>
  <g transform="translate(695, 380)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#D89818" stroke-width="2" opacity="0.45"/>
    <circle cx="0" cy="0" r="28" fill="#FFD040" opacity="0.1"/>
    <circle cx="0" cy="0" r="11" fill="#FFA818" opacity="0.6"/>
    <circle cx="16" cy="-9" r="4" fill="#FFB820" opacity="0.45"/>
    <circle cx="-15" cy="12" r="4" fill="#FFA818" opacity="0.45"/>
  </g>

  <!-- Bone structure illustration (bottom center) -->
  <g transform="translate(420, 370)" opacity="0.75">
    <!-- Bone shaft -->
    <rect x="-12" y="-60" width="24" height="120" rx="12" fill="url(#boneGrad)"/>
    <!-- Bone ends -->
    <ellipse cx="0" cy="-60" rx="28" ry="20" fill="url(#boneGrad)"/>
    <ellipse cx="0" cy="60" rx="28" ry="20" fill="url(#boneGrad)"/>
    <!-- Bone highlight -->
    <rect x="-4" y="-50" width="8" height="100" rx="4" fill="white" opacity="0.3"/>
    <!-- Ca2+ labels -->
    <text x="50" y="-10" font-size="13" fill="#A08040" opacity="0.7" font-family="Georgia, serif">Ca²⁺</text>
    <text x="50" y="20" font-size="13" fill="#A08040" opacity="0.7" font-family="Georgia, serif">Ca²⁺</text>
    <text x="-75" y="5" font-size="13" fill="#A08040" opacity="0.7" font-family="Georgia, serif">Ca²⁺</text>
  </g>

  <!-- Connecting arrows from sun to body to cell -->
  <path d="M310,210 C370,200 420,210 450,230" fill="none" stroke="#FFB820" stroke-width="2" stroke-dasharray="6,5" opacity="0.45" marker-end="url(#arrow)"/>
  <path d="M620,200 C670,190 710,185 720,185" fill="none" stroke="#FFB820" stroke-width="2" stroke-dasharray="6,5" opacity="0.4"/>

  <!-- Floating D3 vitamin molecule particles -->
  <g opacity="0.55">
    <circle cx="360" cy="140" r="7" fill="#FFD050"/>
    <circle cx="372" cy="128" r="4" fill="#FFB820"/>
    <circle cx="348" cy="128" r="4" fill="#FFCA30"/>
    <line x1="360" y1="140" x2="372" y2="128" stroke="#FFB820" stroke-width="1.5"/>
    <line x1="360" y1="140" x2="348" y2="128" stroke="#FFB820" stroke-width="1.5"/>
  </g>
  <g opacity="0.5" transform="translate(480, 380)">
    <circle cx="0" cy="0" r="6" fill="#FFD050"/>
    <circle cx="14" cy="-8" r="4" fill="#FFB020"/>
    <circle cx="14" cy="8" r="4" fill="#FFCA30"/>
    <circle cx="-14" cy="0" r="4" fill="#FFC040"/>
    <line x1="0" y1="0" x2="14" y2="-8" stroke="#FFB820" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="14" y2="8" stroke="#FFB820" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-14" y2="0" stroke="#FFB820" stroke-width="1.5"/>
  </g>
  <g opacity="0.45" transform="translate(640, 100)">
    <circle cx="0" cy="0" r="5" fill="#FFD050"/>
    <circle cx="12" cy="-7" r="3.5" fill="#FFB020"/>
    <circle cx="-12" cy="-7" r="3.5" fill="#FFCA30"/>
    <circle cx="0" cy="14" r="3.5" fill="#FFC040"/>
    <line x1="0" y1="0" x2="12" y2="-7" stroke="#FFB820" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-12" y2="-7" stroke="#FFB820" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="14" stroke="#FFB820" stroke-width="1.5"/>
  </g>

  <!-- Wave decoration at bottom -->
  <path d="M0,470 C150,450 300,490 450,470 C600,450 750,490 900,470" fill="none" stroke="#E8B040" stroke-width="1.5" opacity="0.2"/>
  <path d="M0,490 C200,468 400,500 600,485 C750,473 820,490 900,485" fill="none" stroke="#D090C0" stroke-width="1.5" opacity="0.15"/>

  <!-- Corner accent -->
  <circle cx="880" cy="30" r="55" fill="#FFE870" opacity="0.2"/>
  <circle cx="880" cy="30" r="30" fill="#FFD840" opacity="0.15"/>
  <circle cx="30" cy="480" r="60" fill="#F0D0E8" opacity="0.2"/>
</svg>
