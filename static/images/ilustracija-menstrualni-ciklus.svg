<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="45%" stop-color="#2D1050"/>
      <stop offset="100%" stop-color="#4A1040"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8709A" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#C050C0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E8709A" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="moonGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEEC8"/>
      <stop offset="100%" stop-color="#FFD090"/>
    </linearGradient>
    <radialGradient id="fullMoonGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="60%" stop-color="#FFE8A0"/>
      <stop offset="100%" stop-color="#F0C060"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6020A0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6020A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C03080" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C03080" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur16">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <clipPath id="moonClip1"><circle cx="0" cy="0" r="36"/></clipPath>
    <clipPath id="moonClip2"><circle cx="0" cy="0" r="36"/></clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Background glow orbs -->
  <circle cx="450" cy="160" r="280" fill="url(#bgGlow1)" filter="url(#blur16)" opacity="0.7"/>
  <circle cx="150" cy="420" r="180" fill="url(#bgGlow2)" filter="url(#blur16)" opacity="0.6"/>
  <circle cx="800" cy="380" r="160" fill="url(#bgGlow1)" filter="url(#blur16)" opacity="0.5"/>

  <!-- Stars scattered background -->
  <g fill="white">
    <circle cx="42" cy="28" r="1.2" opacity="0.7"/><circle cx="78" cy="55" r="0.8" opacity="0.5"/>
    <circle cx="118" cy="22" r="1.4" opacity="0.8"/><circle cx="155" cy="48" r="0.9" opacity="0.6"/>
    <circle cx="200" cy="18" r="1.1" opacity="0.7"/><circle cx="238" cy="40" r="0.8" opacity="0.5"/>
    <circle cx="280" cy="28" r="1.3" opacity="0.75"/><circle cx="318" cy="15" r="0.9" opacity="0.6"/>
    <circle cx="356" cy="42" r="1.0" opacity="0.65"/><circle cx="400" cy="20" r="1.4" opacity="0.8"/>
    <circle cx="440" cy="38" r="0.8" opacity="0.5"/><circle cx="488" cy="25" r="1.2" opacity="0.7"/>
    <circle cx="528" cy="12" r="1.0" opacity="0.65"/><circle cx="568" cy="44" r="0.9" opacity="0.6"/>
    <circle cx="615" cy="30" r="1.3" opacity="0.75"/><circle cx="655" cy="18" r="0.8" opacity="0.5"/>
    <circle cx="698" cy="48" r="1.1" opacity="0.7"/><circle cx="740" cy="22" r="1.4" opacity="0.8"/>
    <circle cx="778" cy="38" r="0.9" opacity="0.6"/><circle cx="820" cy="15" r="1.2" opacity="0.7"/>
    <circle cx="858" cy="45" r="0.8" opacity="0.55"/><circle cx="55" cy="85" r="0.9" opacity="0.5"/>
    <circle cx="90" cy="110" r="1.2" opacity="0.65"/><circle cx="135" cy="92" r="0.8" opacity="0.5"/>
    <circle cx="172" cy="118" r="1.0" opacity="0.6"/><circle cx="225" cy="80" r="1.3" opacity="0.7"/>
    <circle cx="268" cy="105" r="0.8" opacity="0.5"/><circle cx="308" cy="88" r="1.1" opacity="0.65"/>
    <circle cx="650" cy="88" r="1.1" opacity="0.65"/><circle cx="695" cy="108" r="0.8" opacity="0.5"/>
    <circle cx="738" cy="85" r="1.3" opacity="0.7"/><circle cx="782" cy="98" r="0.9" opacity="0.6"/>
    <circle cx="825" cy="78" r="1.0" opacity="0.65"/><circle cx="862" cy="105" r="0.8" opacity="0.5"/>
    <circle cx="30" cy="320" r="0.9" opacity="0.45"/><circle cx="68" cy="345" r="1.1" opacity="0.5"/>
    <circle cx="840" cy="280" r="1.0" opacity="0.5"/><circle cx="878" cy="310" r="0.8" opacity="0.45"/>
    <circle cx="22" cy="180" r="1.0" opacity="0.5"/><circle cx="882" cy="180" r="1.0" opacity="0.5"/>
  </g>

  <!-- 4 star sparkles (4-pointed) -->
  <g filter="url(#glow)">
    <g transform="translate(80,150)" fill="white" opacity="0.7">
      <path d="M0,-8 L1.5,-1.5 L8,0 L1.5,1.5 L0,8 L-1.5,1.5 L-8,0 L-1.5,-1.5 Z"/>
    </g>
    <g transform="translate(820,130)" fill="white" opacity="0.65">
      <path d="M0,-7 L1.3,-1.3 L7,0 L1.3,1.3 L0,7 L-1.3,1.3 L-7,0 L-1.3,-1.3 Z"/>
    </g>
    <g transform="translate(50,390)" fill="white" opacity="0.6">
      <path d="M0,-6 L1.1,-1.1 L6,0 L1.1,1.1 L0,6 L-1.1,1.1 L-6,0 L-1.1,-1.1 Z"/>
    </g>
    <g transform="translate(860,380)" fill="white" opacity="0.6">
      <path d="M0,-6 L1.1,-1.1 L6,0 L1.1,1.1 L0,6 L-1.1,1.1 L-6,0 L-1.1,-1.1 Z"/>
    </g>
  </g>

  <!-- Moon phase row — 8 phases spread across width -->
  <!-- Phase 1: New Moon (dark, ring only) -->
  <g transform="translate(90, 185)">
    <circle cx="0" cy="0" r="36" fill="#0E0520" stroke="#6030A8" stroke-width="1.5" opacity="0.9"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#8850C8" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Phase 2: Waxing Crescent -->
  <g transform="translate(210, 185)">
    <circle cx="0" cy="0" r="36" fill="#0E0520"/>
    <path d="M0,-36 A36,36 0 0,1 0,36 A22,36 0 0,0 0,-36 Z" fill="#C8A050" opacity="0.75"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#8850C8" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Phase 3: First Quarter -->
  <g transform="translate(330, 185)">
    <circle cx="0" cy="0" r="36" fill="#0E0520"/>
    <path d="M0,-36 A36,36 0 0,1 0,36 L0,0 Z" fill="#D4A84E" opacity="0.8"/>
    <path d="M0,-36 A36,36 0 0,1 0,36" fill="#D4A84E" opacity="0.8"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#8850C8" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Phase 4: Waxing Gibbous -->
  <g transform="translate(450, 185)">
    <circle cx="0" cy="0" r="36" fill="#0E0520"/>
    <path d="M0,-36 A36,36 0 0,1 0,36 A12,36 0 0,1 0,-36 Z" fill="url(#fullMoonGrad)" opacity="0.85"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#A87020" stroke-width="1.5" opacity="0.5"/>
    <!-- Full moon glow -->
    <circle cx="0" cy="0" r="42" fill="#FFE070" opacity="0.12" filter="url(#blur8)"/>
  </g>
  <!-- Phase 5: Full Moon (largest/brightest) — slight elevation -->
  <!-- Already done above as phase 4 equivalent, let's make this the actual full -->
  <!-- Redo: shift phases -->
  <!-- Phase 5: Full Moon at center -->
  <g transform="translate(450, 180)">
    <circle cx="0" cy="0" r="50" fill="#FFE88A" opacity="0.18" filter="url(#blur8)"/>
    <circle cx="0" cy="0" r="42" fill="url(#fullMoonGrad)" opacity="0.95"/>
    <!-- Moon craters -->
    <circle cx="-12" cy="-10" r="6" fill="#F0C050" opacity="0.5"/>
    <circle cx="15" cy="8" r="8" fill="#EFC048" opacity="0.45"/>
    <circle cx="-5" cy="18" r="5" fill="#F0C858" opacity="0.4"/>
    <circle cx="10" cy="-20" r="4" fill="#EEC050" opacity="0.4"/>
    <circle cx="-20" cy="12" r="4" fill="#F0C858" opacity="0.35"/>
    <!-- Moon highlight -->
    <path d="M-20,-28 C-10,-38 10,-36 18,-24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#FFD070" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Re-layout: 7 distinct phases in a row -->
  <!-- (Overriding above with a clean uniform row) -->
  <rect x="0" y="140" width="900" height="100" fill="url(#bg)" opacity="0.01"/>

  <!-- Clean 7-phase row -->
  <!-- Phase 1: New Moon -->
  <g transform="translate(70, 182)">
    <circle cx="0" cy="0" r="30" fill="#180830" stroke="#7040B8" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="52" text-anchor="middle" font-size="10" fill="#9060B8" opacity="0.7" font-family="Georgia, serif">Nova</text>
  </g>
  <!-- Phase 2: Waxing Crescent -->
  <g transform="translate(200, 182)">
    <circle cx="0" cy="0" r="30" fill="#180830"/>
    <path d="M0,-30 A30,30 0 0,1 0,30 A18,30 0 0,0 0,-30 Z" fill="#C8A050" opacity="0.8"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#7040B8" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" font-size="10" fill="#9060B8" opacity="0.7" font-family="Georgia, serif">Srp</text>
  </g>
  <!-- Phase 3: First Quarter -->
  <g transform="translate(330, 182)">
    <circle cx="0" cy="0" r="30" fill="#180830"/>
    <path d="M0,-30 A30,30 0 0,1 0,30 L0,0 Z" fill="#D4A84E" opacity="0.82"/>
    <path d="M0,-30 A30,30 0 0,1 0,30" fill="none"/>
    <rect x="0" y="-30" width="30" height="60" fill="#D4A84E" opacity="0.82" clip-path="url(#moonClip2)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#7040B8" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" font-size="10" fill="#9060B8" opacity="0.7" font-family="Georgia, serif">Prva</text>
  </g>
  <!-- Phase 4: Waxing Gibbous -->
  <g transform="translate(450, 182)">
    <circle cx="0" cy="0" r="30" fill="#180830"/>
    <path d="M0,-30 A30,30 0 0,1 0,30 A8,30 0 0,1 0,-30 Z" fill="#DDB055" opacity="0.85"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#A07030" stroke-width="1.5" opacity="0.45"/>
    <text x="0" y="52" text-anchor="middle" font-size="10" fill="#9060B8" opacity="0.7" font-family="Georgia, serif">Puna</text>
  </g>
  <!-- Phase 5: Full Moon (center, biggest glow) -->
  <g transform="translate(450, 178)">
    <circle cx="0" cy="0" r="55" fill="#FFE070" opacity="0.15" filter="url(#blur8)"/>
    <circle cx="0" cy="0" r="38" fill="url(#fullMoonGrad)" opacity="0.96"/>
    <circle cx="-11" cy="-9" r="5" fill="#F0C050" opacity="0.45"/>
    <circle cx="13" cy="7" r="7" fill="#EEC050" opacity="0.4"/>
    <circle cx="-4" cy="16" r="4" fill="#F0C858" opacity="0.38"/>
    <circle cx="9" cy="-18" r="3.5" fill="#EEC050" opacity="0.38"/>
    <path d="M-18,-24 C-8,-33 9,-31 16,-20" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#FFD070" stroke-width="2.5" opacity="0.65"/>
    <text x="0" y="58" text-anchor="middle" font-size="10" fill="#E8C050" opacity="0.85" font-family="Georgia, serif">Pun Mjesec</text>
  </g>
  <!-- Phase 6: Waning Gibbous -->
  <g transform="translate(600, 182)">
    <circle cx="0" cy="0" r="30" fill="#180830"/>
    <path d="M0,-30 A30,30 0 0,0 0,30 A8,30 0 0,0 0,-30 Z" fill="#C89A45" opacity="0.8"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#7040B8" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" font-size="10" fill="#9060B8" opacity="0.7" font-family="Georgia, serif">Treća</text>
  </g>
  <!-- Phase 7: Last Quarter -->
  <g transform="translate(720, 182)">
    <circle cx="0" cy="0" r="30" fill="#180830"/>
    <rect x="-30" y="-30" width="30" height="60" fill="#C89A45" opacity="0.8" clip-path="url(#moonClip1)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#7040B8" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" font-size="10" fill="#9060B8" opacity="0.7" font-family="Georgia, serif">Zadnja</text>
  </g>
  <!-- Phase 8: Waning Crescent -->
  <g transform="translate(840, 182)">
    <circle cx="0" cy="0" r="30" fill="#180830"/>
    <path d="M0,-30 A30,30 0 0,0 0,30 A18,30 0 0,1 0,-30 Z" fill="#B88038" opacity="0.75"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#7040B8" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" font-size="10" fill="#9060B8" opacity="0.7" font-family="Georgia, serif">Srp</text>
  </g>

  <!-- Connector line between moons -->
  <line x1="70" y1="182" x2="840" y2="182" stroke="#5030A0" stroke-width="1" stroke-dasharray="3,6" opacity="0.4"/>

  <!-- Menstrual cycle sine wave below -->
  <path d="M40,330 C100,280 160,380 220,330 C280,280 340,380 400,330 C460,280 520,380 580,330 C640,280 700,380 760,330 C820,280 870,330 900,310"
        fill="none" stroke="url(#waveGrad)" stroke-width="3" opacity="0.85"/>
  <!-- Wave fill -->
  <path d="M40,330 C100,280 160,380 220,330 C280,280 340,380 400,330 C460,280 520,380 580,330 C640,280 700,380 760,330 C820,280 870,330 900,310 L900,500 L40,500 Z"
        fill="#C050A0" opacity="0.08"/>

  <!-- Second wave (offset) -->
  <path d="M40,360 C100,320 160,400 220,360 C280,320 340,400 400,360 C460,320 520,400 580,360 C640,320 700,400 760,360 C820,320 870,360 900,345"
        fill="none" stroke="#9040C0" stroke-width="1.5" opacity="0.45"/>

  <!-- Cycle phase labels on wave -->
  <text x="130" y="420" text-anchor="middle" font-size="11" fill="#E890B8" opacity="0.75" font-family="Georgia, serif">Menstruacija</text>
  <text x="310" y="410" text-anchor="middle" font-size="11" fill="#C870A0" opacity="0.7" font-family="Georgia, serif">Folikularna</text>
  <text x="490" y="420" text-anchor="middle" font-size="11" fill="#FFD080" opacity="0.8" font-family="Georgia, serif">Ovulacija</text>
  <text x="670" y="410" text-anchor="middle" font-size="11" fill="#C870A0" opacity="0.7" font-family="Georgia, serif">Lutealna</text>

  <!-- Phase marker dots on wave -->
  <circle cx="130" cy="355" r="6" fill="#E890B8" opacity="0.8" filter="url(#glow)"/>
  <circle cx="310" cy="330" r="6" fill="#C870A0" opacity="0.7" filter="url(#glow)"/>
  <circle cx="490" cy="300" r="8" fill="#FFD080" opacity="0.9" filter="url(#glow)"/>
  <circle cx="670" cy="330" r="6" fill="#C870A0" opacity="0.7" filter="url(#glow)"/>

  <!-- Vertical dotted drop lines -->
  <line x1="130" y1="245" x2="130" y2="348" stroke="#E890B8" stroke-width="1" stroke-dasharray="4,5" opacity="0.3"/>
  <line x1="490" y1="248" x2="490" y2="292" stroke="#FFD080" stroke-width="1" stroke-dasharray="4,5" opacity="0.35"/>

  <!-- Botanical leaf accents (left side) -->
  <g transform="translate(22, 290)" opacity="0.35">
    <path d="M0,0 C10,-30 35,-40 40,-20 C45,0 30,15 0,0 Z" fill="#6040A0"/>
    <line x1="0" y1="0" x2="30" y2="-20" stroke="#8060C0" stroke-width="1"/>
  </g>
  <g transform="translate(12, 330)" opacity="0.3">
    <path d="M0,0 C15,-25 38,-30 38,-12 C38,5 20,15 0,0 Z" fill="#5030B0"/>
    <line x1="0" y1="0" x2="28" y2="-14" stroke="#7050C0" stroke-width="1"/>
  </g>
  <!-- Right side botanical -->
  <g transform="translate(878, 280)" opacity="0.35">
    <path d="M0,0 C-10,-30 -35,-40 -40,-20 C-45,0 -30,15 0,0 Z" fill="#6040A0"/>
    <line x1="0" y1="0" x2="-30" y2="-20" stroke="#8060C0" stroke-width="1"/>
  </g>
  <g transform="translate(888, 320)" opacity="0.3">
    <path d="M0,0 C-15,-25 -38,-30 -38,-12 C-38,5 -20,15 0,0 Z" fill="#5030B0"/>
    <line x1="0" y1="0" x2="-28" y2="-14" stroke="#7050C0" stroke-width="1"/>
  </g>
</svg>
