  <line x1="95" y1="355" x2="205" y2="355" stroke="#6b4fa0" stroke-width="1"/>
  <text x="100" y="372" fill="#4caf50" font-size="13">✓</text>
  <text x="118" y="372" fill="#c9a8e0" font-size="11" font-family="Georgia">PAPA test</text>
  <text x="100" y="390" fill="#4caf50" font-size="13">✓</text>
  <text x="118" y="390" fill="#c9a8e0" font-size="11" font-family="Georgia">Ultrazvuk</text>
  <text x="100" y="408" fill="#4caf50" font-size="13">✓</text>
  <text x="118" y="408" fill="#c9a8e0" font-size="11" font-family="Georgia">Pregled</text>

