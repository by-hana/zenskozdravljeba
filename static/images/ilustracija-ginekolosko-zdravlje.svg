  <text x="625" y="373" fill="#c9a8e0" font-size="11" font-family="Georgia">Higijena</text>
  <circle cx="610" cy="389" r="5" fill="#9c27b0" opacity="0.7"/>
  <text x="625" y="393" fill="#c9a8e0" font-size="11" font-family="Georgia">Infekcije</text>
  <circle cx="610" cy="409" r="5" fill="#c9a8e0" opacity="0.7"/>
