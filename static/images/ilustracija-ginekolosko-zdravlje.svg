  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Central uterus shape -->
  <path d="M380,120 C340,120 310,145 305,180 C298,220 310,250 320,270 C330,285 355,305 380,310 C405,305 430,285 440,270 C450,250 462,220 455,180 C450,145 420,120 380,120 Z" fill="none" stroke="#e91e8c" stroke-width="3"/>
