    <circle cx="62" cy="-36" r="7" fill="#C870C8" opacity="0.8"/>
    <circle cx="62" cy="36" r="7" fill="#C870C8" opacity="0.8"/>
    <circle cx="0" cy="72" r="7" fill="#C870C8" opacity="0.8"/>
    <circle cx="-62" cy="36" r="7" fill="#C870C8" opacity="0.8"/>
    <circle cx="-62" cy="-36" r="7" fill="#C870C8" opacity="0.8"/>
    <circle cx="0" cy="-44" r="5" fill="#A050B8" opacity="0.7"/>
    <circle cx="38" cy="-22" r="5" fill="#A050B8" opacity="0.7"/>
    <circle cx="38" cy="22" r="5" fill="#A050B8" opacity="0.7"/>
    <circle cx="0" cy="44" r="5" fill="#A050B8" opacity="0.7"/>
    <circle cx="-38" cy="22" r="5" fill="#A050B8" opacity="0.7"/>
    <circle cx="-38" cy="-22" r="5" fill="#A050B8" opacity="0.7"/>
    <circle cx="0" cy="0" r="16" fill="url(#ringGrad)" opacity="0.7"/>
