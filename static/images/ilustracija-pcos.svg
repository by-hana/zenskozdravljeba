    <circle cx="168" cy="66" r="7" fill="none" stroke="white" stroke-width="2" opacity="0.75"/>
    <circle cx="153" cy="64" r="6" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
    <circle cx="163" cy="78" r="5" fill="none" stroke="white" stroke-width="2" opacity="0.65"/>
    <circle cx="149" cy="76" r="7" fill="none" stroke="white" stroke-width="2" opacity="0.75"/>
    <circle cx="170" cy="80" r="5" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <!-- Inner uterus detail -->
