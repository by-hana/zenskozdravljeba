    <line x1="0" y1="0" x2="10" y2="-17" stroke="#B060B8" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-10" y2="-17" stroke="#B060B8" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-20" y2="0" stroke="#B060B8" stroke-width="1.5"/>
  </g>
  <!-- Lone floating dots -->
  <circle cx="310" cy="355" r="5" fill="#D470A8" opacity="0.4"/>
  <circle cx="325" cy="370" r="3.5" fill="#9B48B0" opacity="0.35"/>
  <circle cx="295" cy="375" r="4" fill="#C060A0" opacity="0.4"/>
  <circle cx="680" cy="310" r="5" fill="#B060B8" opacity="0.4"/>
  <circle cx="695" cy="325" r="3.5" fill="#D078C8" opacity="0.35"/>
  <circle cx="665" cy="320" r="4" fill="#9048A8" opacity="0.4"/>
  <circle cx="450" cy="80" r="6" fill="#D470A8" opacity="0.4"/>
