    <!-- Glow behind -->
    <ellipse cx="0" cy="10" rx="130" ry="100" fill="#F0C8E0" opacity="0.35" filter="url(#blur4)"/>
    <!-- Uterus body -->
    <path d="M-45,-65 C-70,-45 -80,-10 -68,15 C-55,42 -32,52 0,56 C32,52 55,42 68,15 C80,-10 70,-45 45,-65 C25,-82 -25,-82 -45,-65 Z" fill="url(#ovaryGrad)" opacity="0.88"/>
    <!-- Uterus highlight -->
    <path d="M-28,-55 C-45,-35 -48,0 -38,22" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
    <!-- Cervix channel -->
    <rect x="-10" y="52" width="20" height="28" rx="10" fill="#B050A0" opacity="0.75"/>
    <!-- Fallopian tubes - left -->
    <path d="M-68,15 C-95,-5 -128,5 -152,28 C-165,42 -162,62 -152,68" fill="none" stroke="#D060A8" stroke-width="5" stroke-linecap="round"/>
