    <line x1="0" y1="0" x2="18" y2="10" stroke="#C858A0" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-18" y2="0" stroke="#C858A0" stroke-width="1.5"/>
  </g>
  <g transform="translate(570, 390)" opacity="0.5">
    <circle cx="0" cy="0" r="6" fill="#9B48B0"/>
    <circle cx="-20" cy="-8" r="5" fill="#D870B0"/>
    <circle cx="0" cy="-20" r="4" fill="#C858A0"/>
    <circle cx="20" cy="-8" r="5" fill="#8840A8"/>
    <line x1="0" y1="0" x2="-20" y2="-8" stroke="#9B48B0" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#9B48B0" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="20" y2="-8" stroke="#9B48B0" stroke-width="1.5"/>
  </g>
  <g transform="translate(380, 400)" opacity="0.45">
    <circle cx="0" cy="0" r="5" fill="#C060A0"/>
    <circle cx="15" cy="10" r="4" fill="#A040B0"/>
    <circle cx="-15" cy="10" r="4" fill="#D070B8"/>
    <line x1="0" y1="0" x2="15" y2="10" stroke="#C060A0" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-15" y2="10" stroke="#C060A0" stroke-width="1.5"/>
  </g>
  <g transform="translate(650, 130)" opacity="0.48">
    <circle cx="0" cy="0" r="6" fill="#B060B8"/>
    <circle cx="20" cy="0" r="4" fill="#D078C8"/>
    <circle cx="10" cy="-17" r="4" fill="#9048A8"/>
    <circle cx="-10" cy="-17" r="4" fill="#C868B8"/>
