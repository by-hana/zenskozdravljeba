    <line x1="62" y1="36" x2="92" y2="52" stroke="#B870C8" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-72" x2="0" y2="-100" stroke="#B870C8" stroke-width="2" opacity="0.5"/>
    <circle cx="92" cy="-52" r="8" fill="#8840B0" opacity="0.75"/>
    <circle cx="92" cy="52" r="8" fill="#8840B0" opacity="0.75"/>
    <circle cx="0" cy="-100" r="8" fill="#8840B0" opacity="0.75"/>
