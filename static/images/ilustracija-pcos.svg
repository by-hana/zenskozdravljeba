  <!-- Dashed connection lines (hormone pathways) -->
  <path d="M263,240 C320,200 385,220 450,248" fill="none" stroke="#C860A0" stroke-width="1.5" stroke-dasharray="7,5" opacity="0.35"/>
  <path d="M638,248 C672,238 700,240 745,248" fill="none" stroke="#B060C0" stroke-width="1.5" stroke-dasharray="7,5" opacity="0.35"/>

  <!-- Floating small molecule clusters around scene -->
  <g transform="translate(340, 110)" opacity="0.55">
    <circle cx="0" cy="0" r="6" fill="#C858A0"/>
    <circle cx="18" cy="-10" r="5" fill="#9B48B0"/>
    <circle cx="18" cy="10" r="5" fill="#D870B0"/>
    <circle cx="-18" cy="0" r="4" fill="#B050A8"/>
