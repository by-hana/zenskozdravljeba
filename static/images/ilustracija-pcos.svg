    <path d="M-152,68 C-158,62 -165,68 -168,78" fill="none" stroke="#D060A8" stroke-width="3" stroke-linecap="round"/>
    <!-- Fimbriae right -->
    <path d="M152,68 C160,75 148,80 155,88" fill="none" stroke="#D060A8" stroke-width="3" stroke-linecap="round"/>
    <path d="M152,68 C145,78 148,85 140,90" fill="none" stroke="#D060A8" stroke-width="3" stroke-linecap="round"/>
    <path d="M152,68 C158,62 165,68 168,78" fill="none" stroke="#D060A8" stroke-width="3" stroke-linecap="round"/>
    <!-- Left ovary with multiple follicles (PCOS pattern) -->
    <ellipse cx="-158" cy="74" rx="34" ry="26" fill="url(#ovaryGrad)" opacity="0.92"/>
    <circle cx="-168" cy="66" r="7" fill="none" stroke="white" stroke-width="2" opacity="0.75"/>
    <circle cx="-153" cy="64" r="6" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
    <circle cx="-163" cy="78" r="5" fill="none" stroke="white" stroke-width="2" opacity="0.65"/>
    <circle cx="-149" cy="76" r="7" fill="none" stroke="white" stroke-width="2" opacity="0.75"/>
    <circle cx="-170" cy="80" r="5" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <!-- Right ovary with multiple follicles -->
