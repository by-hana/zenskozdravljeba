<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF0F6"/>
      <stop offset="50%" stop-color="#F2E6F9"/>
      <stop offset="100%" stop-color="#E8D5F5"/>
    </linearGradient>
    <linearGradient id="ovaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4729E"/>
      <stop offset="100%" stop-color="#9B4DB8"/>
    </linearGradient>
    <linearGradient id="molGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C85490"/>
      <stop offset="100%" stop-color="#8B3DB0"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E090C0"/>
      <stop offset="100%" stop-color="#A050C8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0B8D8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F0B8D8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C890E8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C890E8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur12">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Large background glow circles -->
  <circle cx="160" cy="400" r="220" fill="url(#glow1)" filter="url(#blur12)"/>
  <circle cx="760" cy="120" r="200" fill="url(#glow2)" filter="url(#blur12)"/>
  <circle cx="450" cy="250" r="240" fill="#F8E8F5" opacity="0.25" filter="url(#blur12)"/>

  <!-- Dot grid background -->
  <g opacity="0.18" fill="#B070B0">
    <circle cx="60" cy="60" r="2.5"/><circle cx="120" cy="60" r="2.5"/><circle cx="180" cy="60" r="2.5"/><circle cx="240" cy="60" r="2.5"/><circle cx="300" cy="60" r="2.5"/><circle cx="360" cy="60" r="2.5"/><circle cx="420" cy="60" r="2.5"/><circle cx="480" cy="60" r="2.5"/><circle cx="540" cy="60" r="2.5"/><circle cx="600" cy="60" r="2.5"/><circle cx="660" cy="60" r="2.5"/><circle cx="720" cy="60" r="2.5"/><circle cx="780" cy="60" r="2.5"/><circle cx="840" cy="60" r="2.5"/>
    <circle cx="60" cy="120" r="2.5"/><circle cx="120" cy="120" r="2.5"/><circle cx="180" cy="120" r="2.5"/><circle cx="240" cy="120" r="2.5"/><circle cx="300" cy="120" r="2.5"/><circle cx="360" cy="120" r="2.5"/><circle cx="420" cy="120" r="2.5"/><circle cx="480" cy="120" r="2.5"/><circle cx="540" cy="120" r="2.5"/><circle cx="600" cy="120" r="2.5"/><circle cx="660" cy="120" r="2.5"/><circle cx="720" cy="120" r="2.5"/><circle cx="780" cy="120" r="2.5"/><circle cx="840" cy="120" r="2.5"/>
    <circle cx="60" cy="180" r="2.5"/><circle cx="120" cy="180" r="2.5"/><circle cx="180" cy="180" r="2.5"/><circle cx="240" cy="180" r="2.5"/><circle cx="300" cy="180" r="2.5"/><circle cx="360" cy="180" r="2.5"/><circle cx="420" cy="180" r="2.5"/><circle cx="480" cy="180" r="2.5"/><circle cx="540" cy="180" r="2.5"/><circle cx="600" cy="180" r="2.5"/><circle cx="660" cy="180" r="2.5"/><circle cx="720" cy="180" r="2.5"/><circle cx="780" cy="180" r="2.5"/><circle cx="840" cy="180" r="2.5"/>
    <circle cx="60" cy="240" r="2.5"/><circle cx="120" cy="240" r="2.5"/><circle cx="180" cy="240" r="2.5"/><circle cx="240" cy="240" r="2.5"/><circle cx="300" cy="240" r="2.5"/><circle cx="360" cy="240" r="2.5"/><circle cx="420" cy="240" r="2.5"/><circle cx="480" cy="240" r="2.5"/><circle cx="540" cy="240" r="2.5"/><circle cx="600" cy="240" r="2.5"/><circle cx="660" cy="240" r="2.5"/><circle cx="720" cy="240" r="2.5"/><circle cx="780" cy="240" r="2.5"/><circle cx="840" cy="240" r="2.5"/>
    <circle cx="60" cy="300" r="2.5"/><circle cx="120" cy="300" r="2.5"/><circle cx="180" cy="300" r="2.5"/><circle cx="240" cy="300" r="2.5"/><circle cx="300" cy="300" r="2.5"/><circle cx="360" cy="300" r="2.5"/><circle cx="420" cy="300" r="2.5"/><circle cx="480" cy="300" r="2.5"/><circle cx="540" cy="300" r="2.5"/><circle cx="600" cy="300" r="2.5"/><circle cx="660" cy="300" r="2.5"/><circle cx="720" cy="300" r="2.5"/><circle cx="780" cy="300" r="2.5"/><circle cx="840" cy="300" r="2.5"/>
    <circle cx="60" cy="360" r="2.5"/><circle cx="120" cy="360" r="2.5"/><circle cx="180" cy="360" r="2.5"/><circle cx="240" cy="360" r="2.5"/><circle cx="300" cy="360" r="2.5"/><circle cx="360" cy="360" r="2.5"/><circle cx="420" cy="360" r="2.5"/><circle cx="480" cy="360" r="2.5"/><circle cx="540" cy="360" r="2.5"/><circle cx="600" cy="360" r="2.5"/><circle cx="660" cy="360" r="2.5"/><circle cx="720" cy="360" r="2.5"/><circle cx="780" cy="360" r="2.5"/><circle cx="840" cy="360" r="2.5"/>
    <circle cx="60" cy="420" r="2.5"/><circle cx="120" cy="420" r="2.5"/><circle cx="180" cy="420" r="2.5"/><circle cx="240" cy="420" r="2.5"/><circle cx="300" cy="420" r="2.5"/><circle cx="360" cy="420" r="2.5"/><circle cx="420" cy="420" r="2.5"/><circle cx="480" cy="420" r="2.5"/><circle cx="540" cy="420" r="2.5"/><circle cx="600" cy="420" r="2.5"/><circle cx="660" cy="420" r="2.5"/><circle cx="720" cy="420" r="2.5"/><circle cx="780" cy="420" r="2.5"/><circle cx="840" cy="420" r="2.5"/>
  </g>

  <!-- Left: Estrogen hexagon molecule structure -->
  <g transform="translate(160, 240)">
    <!-- Outer hex ring -->
    <polygon points="0,-85 73,-42 73,42 0,85 -73,42 -73,-42" fill="none" stroke="url(#molGrad)" stroke-width="2.5" opacity="0.7"/>
    <!-- Inner hex ring -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26" fill="none" stroke="url(#molGrad)" stroke-width="2" opacity="0.55"/>
    <!-- Connecting lines between rings -->
    <line x1="0" y1="-85" x2="0" y2="-52" stroke="#C860A0" stroke-width="2" opacity="0.5"/>
    <line x1="73" y1="-42" x2="45" y2="-26" stroke="#C860A0" stroke-width="2" opacity="0.5"/>
    <line x1="73" y1="42" x2="45" y2="26" stroke="#C860A0" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="85" x2="0" y2="52" stroke="#C860A0" stroke-width="2" opacity="0.5"/>
    <line x1="-73" y1="42" x2="-45" y2="26" stroke="#C860A0" stroke-width="2" opacity="0.5"/>
    <line x1="-73" y1="-42" x2="-45" y2="-26" stroke="#C860A0" stroke-width="2" opacity="0.5"/>
    <!-- Outer vertices -->
    <circle cx="0" cy="-85" r="7" fill="#D470A8" opacity="0.85"/>
    <circle cx="73" cy="-42" r="7" fill="#D470A8" opacity="0.85"/>
    <circle cx="73" cy="42" r="7" fill="#D470A8" opacity="0.85"/>
    <circle cx="0" cy="85" r="7" fill="#D470A8" opacity="0.85"/>
    <circle cx="-73" cy="42" r="7" fill="#D470A8" opacity="0.85"/>
    <circle cx="-73" cy="-42" r="7" fill="#D470A8" opacity="0.85"/>
    <!-- Inner vertices -->
    <circle cx="0" cy="-52" r="5" fill="#B850A0" opacity="0.75"/>
    <circle cx="45" cy="-26" r="5" fill="#B850A0" opacity="0.75"/>
    <circle cx="45" cy="26" r="5" fill="#B850A0" opacity="0.75"/>
    <circle cx="0" cy="52" r="5" fill="#B850A0" opacity="0.75"/>
    <circle cx="-45" cy="26" r="5" fill="#B850A0" opacity="0.75"/>
    <circle cx="-45" cy="-26" r="5" fill="#B850A0" opacity="0.75"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="18" fill="url(#molGrad)" opacity="0.75"/>
    <circle cx="0" cy="0" r="10" fill="white" opacity="0.3"/>
    <!-- Side chains -->
    <line x1="0" y1="-85" x2="0" y2="-120" stroke="#C860A0" stroke-width="2.5" opacity="0.6"/>
    <line x1="73" y1="-42" x2="105" y2="-60" stroke="#C860A0" stroke-width="2.5" opacity="0.6"/>
    <line x1="-73" y1="-42" x2="-105" y2="-60" stroke="#C860A0" stroke-width="2.5" opacity="0.6"/>
    <circle cx="0" cy="-120" r="9" fill="#9B3D98" opacity="0.8"/>
    <circle cx="105" cy="-60" r="9" fill="#9B3D98" opacity="0.8"/>
    <circle cx="-105" cy="-60" r="9" fill="#9B3D98" opacity="0.8"/>
    <circle cx="0" cy="-120" r="5" fill="white" opacity="0.4"/>
    <circle cx="105" cy="-60" r="5" fill="white" opacity="0.4"/>
    <circle cx="-105" cy="-60" r="5" fill="white" opacity="0.4"/>
  </g>

  <!-- Center: Abstract reproductive anatomy -->
